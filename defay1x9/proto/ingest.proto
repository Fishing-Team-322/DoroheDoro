syntax = "proto3";

package dorohedoro.v1;

option go_package = "github.com/example/dorohedoro/pkg/proto;logsv1";

message LogEvent {
  int64 timestamp_unix_ms = 1;
  string message = 2;
  string source = 3;
  string source_type = 4;
  string service = 5;
  string severity = 6;
  map<string, string> labels = 7;
  string raw = 8;
}

message LogBatch {
  string agent_id = 1;
  string host = 2;
  repeated LogEvent events = 3;
  int64 sent_at_unix_ms = 4;
}

message IngestResponse {
  int32 accepted_count = 1;
  int32 rejected_count = 2;
  repeated string errors = 3;
  string request_id = 4;
}

service IngestionService {
  rpc IngestBatch(LogBatch) returns (IngestResponse);
}
