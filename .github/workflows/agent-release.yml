name: agent-release

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image metadata
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_TAG="${INPUT_TAG:-main-${SHORT_SHA}}"
          echo "image_repository=${{ vars.AGENT_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"
          echo "channel=main" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "floating_tag=main" >> "$GITHUB_OUTPUT"
          echo "version=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure repository variable is configured
        run: |
          if [ -z "${{ steps.vars.outputs.image_repository }}" ]; then
            echo "Repository variable AGENT_IMAGE_REPOSITORY is required" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch agent image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent-rs/packaging/container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.floating_tag }}
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
          provenance: false
          sbom: false

      - name: Generate image compatibility manifest
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          bash scripts/release/generate-agent-image-manifest.sh \
            --image-repository "${{ steps.vars.outputs.image_repository }}" \
            --image-tag "${{ steps.vars.outputs.image_tag }}" \
            --image-digest "${{ steps.build.outputs.digest }}" \
            --version "${VERSION}" \
            --release-channel "${{ steps.vars.outputs.channel }}" \
            --output-dir "dist/agent-image/${VERSION}"

      - name: Verify compatibility manifest contents
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          EXPECTED_DIGEST: ${{ steps.build.outputs.digest }}
          EXPECTED_REF: ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
        run: |
          MANIFEST="dist/agent-image/${VERSION}/agent-release-manifest.json"
          grep -q '"install_mode": "docker_image"' "${MANIFEST}"
          grep -q '"package_type": "container"' "${MANIFEST}"
          grep -q "\"artifact_path\": \"${EXPECTED_REF}\"" "${MANIFEST}"
          grep -q "\"image_digest\": \"${EXPECTED_DIGEST}\"" "${MANIFEST}"

      - name: Upload image manifest metadata
        uses: actions/upload-artifact@v4
        with:
          name: agent-image-release
          path: dist/agent-image/${{ steps.vars.outputs.version }}
