name: agent-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version override
        required: false
  push:
    tags:
      - "agent-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: vars
        env:
          RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          echo "release_version=${RAW_VERSION#agent-v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq dpkg-dev gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.vars.outputs.release_version }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          bash scripts/release/build-agent-artifacts.sh \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}" \
            --version "${VERSION}"

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-artifacts-${{ matrix.arch }}
          path: dist/agent/${{ steps.vars.outputs.release_version }}

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: vars
        env:
          RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          echo "release_version=${RAW_VERSION#agent-v}" >> "$GITHUB_OUTPUT"

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/agent/downloaded

      - name: Normalize release directory
        env:
          VERSION: ${{ steps.vars.outputs.release_version }}
        run: |
          set -euo pipefail
          mkdir -p "dist/agent/${VERSION}"
          find dist/agent/downloaded -type f -exec mv {} "dist/agent/${VERSION}/" \;

      - name: Generate manifest
        env:
          VERSION: ${{ steps.vars.outputs.release_version }}
        run: |
          bash scripts/release/generate-manifest.sh --version "${VERSION}"

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: agent-release-manifest
          path: dist/agent/${{ steps.vars.outputs.release_version }}/agent-release-manifest.json
