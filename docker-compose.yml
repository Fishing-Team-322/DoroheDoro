services:
  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    profiles: ["analytics"]
    ports:
      - "8123:8123"
      - "9000:9000"

  server:
    build:
      context: .
      dockerfile: deployments/docker/server.Dockerfile
    environment:
      LOG_LEVEL: info
      HTTP_LISTEN_ADDR: :8080
      GRPC_LISTEN_ADDR: :9090
      NATS_URL: nats://nats:4222
      NATS_STREAM_NAME: LOGS
      NATS_SUBJECT: logs.normalized
      NATS_INDEXER_CONSUMER: logs-opensearch-indexer
      NATS_ANALYTICS_CONSUMER: logs-clickhouse-indexer
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX_PREFIX: logs
      OPENSEARCH_BULK_FLUSH_SIZE: 200
      OPENSEARCH_BULK_FLUSH_INTERVAL: 2s
      OPENSEARCH_INDEX_CACHE_TTL: 10m
      ENROLLMENT_TOKEN: dev-bootstrap-token
      INGEST_TLS_MODE: disabled
      INGEST_MTLS_ENABLED: "false"
      DEFAULT_POLICY_REVISION: rev-1
      DEFAULT_POLICY_BATCH_SIZE: 100
      DEFAULT_POLICY_BATCH_WAIT: 5s
      CLICKHOUSE_ENABLED: "false"
      CLICKHOUSE_DSN: http://clickhouse:8123
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_TABLE: logs_analytics
      CLICKHOUSE_FLUSH_SIZE: 200
      CLICKHOUSE_FLUSH_INTERVAL: 2s
      WS_BUFFER_SIZE: 256
    depends_on:
      - nats
      - opensearch
    ports:
      - "8080:8080"
      - "9090:9090"

  fake-agent:
    build:
      context: .
      dockerfile: deployments/docker/fake-agent.Dockerfile
    environment:
      INGEST_GRPC_ADDR: server:9090
      SERVER_HTTP_ADDR: http://server:8080
      FAKE_AGENT_HOST: demo-host
      FAKE_AGENT_ENROLLMENT_TOKEN: dev-bootstrap-token
      FAKE_AGENT_GENERATE: "true"
      FAKE_AGENT_INTERVAL: 10s
    depends_on:
      - server
    profiles: ["demo"]
