services:
  nats:
    image: nats:2.11-alpine
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doro"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: "single-node"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    profiles: ["analytics"]
    ports:
      - "8123:8123"
      - "9000:9000"

  server:
    build:
      context: ./defay1x9
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: edge-api
      LOG_LEVEL: info
      HTTP_LISTEN_ADDR: :8080
      GRPC_LISTEN_ADDR: :9090
      NATS_URL: nats://nats:4222
      NATS_REQUEST_TIMEOUT: 3s
      HTTP_REQUEST_TIMEOUT: 15s
      GRPC_REQUEST_TIMEOUT: 15s
      HTTP_MAX_BODY_BYTES: 1048576
      AGENT_LOG_BATCH_SIZE: 1000
      STREAM_HEARTBEAT_INTERVAL: 25s
      STREAM_RETRY_INTERVAL: 5s
      HTTP_AUTH_STUB_ENABLED: "true"
      GRPC_MTLS_HOOK_ENABLED: "false"
    depends_on:
      - nats
    ports:
      - "8080:8080"
      - "9090:9090"

  fake-agent:
    build:
      context: ./defay1x9
      dockerfile: Dockerfile
    command: ["/usr/local/bin/fake-agent"]
    environment:
      EDGE_API_GRPC_ADDR: edge-api:9090
      FAKE_AGENT_ENROLLMENT_TOKEN: dev-bootstrap-token
      FAKE_AGENT_HOST: smoke-host
    depends_on:
      - edge-api
    profiles: ["smoke"]

volumes:
  opensearch-data:
  postgres-data:
