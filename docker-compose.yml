services:
  postgres:
    image: postgres:15-alpine
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/edge
      EDGE_API_INTERNAL_URL: http://edge-api:8080
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      edge-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/ru/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  edge-api:
    build:
      context: ./edge_api
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: edge-api
      LOG_LEVEL: debug
      HTTP_LISTEN_ADDR: :8080
      GRPC_LISTEN_ADDR: :9090
      NATS_URL: nats://nats:4222
      NATS_REQUEST_TIMEOUT: 3s
      HTTP_REQUEST_TIMEOUT: 15s
      GRPC_REQUEST_TIMEOUT: 15s
      HTTP_MAX_BODY_BYTES: 1048576
      AGENT_LOG_BATCH_SIZE: 1000
      STREAM_HEARTBEAT_INTERVAL: 25s
      STREAM_RETRY_INTERVAL: 5s
      HTTP_AUTH_STUB_ENABLED: "true"
      DEV_TEST_LOGIN: admin
      DEV_TEST_EMAIL: admin@example.com
      DEV_TEST_PASSWORD: admin123
      DEV_TEST_USER_ID: dev-user-1
      DEV_TEST_ROLE: admin
      EDGE_API_INTERNAL_URL: http://edge-api:8080
      COOKIE_SECURE: "false"
      SESSION_COOKIE_SECURE: "false"
      SESSION_TTL: 24h
      GRPC_MTLS_HOOK_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - postgres
      - nats
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5s

  nats:
    image: nats:2.11-alpine
    command: ["-m", "8222"]
    ports:
      - "3000:3000"

volumes:
  postgres-data:
