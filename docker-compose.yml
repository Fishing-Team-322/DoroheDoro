services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/edge
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/edge
      EDGE_API_INTERNAL_URL: http://edge-api:8080
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      edge-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/ru/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  edge-api:
    image: dorohedoro-edge-api-dev
    build:
      context: ./edge_api
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: edge-api
      SERVICE_VERSION: dev
      LOG_LEVEL: debug
      HTTP_LISTEN_ADDR: :8080
      AGENT_GRPC_LISTEN_ADDR: :9090
      AGENT_MTLS_ENABLED: "true"
      AGENT_TLS_CERT_FILE: /certs/server.crt
      AGENT_TLS_KEY_FILE: /certs/server.key
      AGENT_TLS_CLIENT_CA_FILE: /certs/ca.crt
      NATS_URL: nats://nats:4222
      NATS_REQUEST_TIMEOUT: 3s
      HTTP_REQUEST_TIMEOUT: 15s
      GRPC_REQUEST_TIMEOUT: 15s
      HTTP_MAX_BODY_BYTES: 1048576
      AGENT_LOG_BATCH_SIZE: 1000
      STREAM_HEARTBEAT_INTERVAL: 25s
      STREAM_RETRY_INTERVAL: 5s
      HTTP_AUTH_STUB_ENABLED: "true"
      DEV_TEST_LOGIN: admin
      DEV_TEST_EMAIL: admin@example.com
      DEV_TEST_PASSWORD: admin123
      DEV_TEST_USER_ID: dev-user-1
      DEV_TEST_ROLE: admin
      COOKIE_SECURE: "false"
      SESSION_TTL: 24h
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      nats:
        condition: service_started
      enrollment-plane:
        condition: service_healthy
      control-plane:
        condition: service_healthy
      deployment-plane:
        condition: service_healthy
      edge-api-certs:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - edge-api-certs:/certs:ro
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5s

  edge-api-certs:
    image: dorohedoro-edge-api-dev
    build:
      context: ./edge_api
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/dev-certs"]
    environment:
      DEV_CERTS_OUT_DIR: /certs
    volumes:
      - edge-api-certs:/certs

  nats:
    image: nats:2.11-alpine
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doro"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  enrollment-plane:
    image: dorohedoro-enrollment-plane-dev
    build:
      context: .
      dockerfile: ./server-rs/Dockerfile
      args:
        RUST_BIN: enrollment-plane
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/doro
      NATS_URL: nats://nats:4222
      ENROLLMENT_HTTP_ADDR: 0.0.0.0:8081
      ENROLLMENT_DEV_BOOTSTRAP_TOKEN: dev-bootstrap-token
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://127.0.0.1:8081/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  control-plane:
    image: dorohedoro-control-plane-dev
    build:
      context: .
      dockerfile: ./server-rs/Dockerfile
      args:
        RUST_BIN: control-plane
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/doro
      NATS_URL: nats://nats:4222
      ENROLLMENT_HTTP_ADDR: 0.0.0.0:8081
      CONTROL_HTTP_ADDR: 0.0.0.0:8082
      ENROLLMENT_DEV_BOOTSTRAP_TOKEN: dev-bootstrap-token
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://127.0.0.1:8082/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  deployment-plane:
    image: dorohedoro-deployment-plane-dev
    build:
      context: .
      dockerfile: ./server-rs/Dockerfile
      args:
        RUST_BIN: deployment-plane
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/doro
      NATS_URL: nats://nats:4222
      DEPLOYMENT_HTTP_ADDR: 0.0.0.0:8083
      DEPLOYMENT_EXECUTOR_KIND: mock
      EDGE_PUBLIC_URL: http://localhost:8080
      EDGE_GRPC_ADDR: localhost:9090
      AGENT_STATE_DIR_DEFAULT: /var/lib/doro-agent
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      control-plane:
        condition: service_healthy
      enrollment-plane:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://127.0.0.1:8083/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  edge-api-certs:
