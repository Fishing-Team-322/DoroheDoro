---
doro_agent_state: present
doro_agent_version: ""
doro_agent_install_mode: auto

doro_agent_artifact_manifest_path: ""
doro_agent_artifact_manifest_url: ""
doro_agent_release_base_url: ""
doro_agent_selected_artifact: ""

doro_agent_user: doro-agent
doro_agent_group: doro-agent
doro_agent_service_name: doro-agent
doro_agent_config_dir: /etc/doro-agent
doro_agent_config_path: /etc/doro-agent/config.yaml
doro_agent_env_path: /etc/doro-agent/agent.env
doro_agent_pki_dir: /etc/doro-agent/pki
doro_agent_state_dir: /var/lib/doro-agent
doro_agent_log_dir: /var/log/doro-agent
doro_agent_package_binary_path: /usr/bin/doro-agent
doro_agent_tarball_binary_path: /usr/local/bin/doro-agent
doro_agent_systemd_unit_path: /etc/systemd/system/doro-agent.service
doro_agent_docs_dir: /usr/share/doc/doro-agent

doro_agent_edge_url: http://localhost:8080
doro_agent_edge_grpc_addr: localhost:9090
doro_agent_bootstrap_token: dev-bootstrap-token
doro_agent_log_level: info
doro_agent_transport_mode: edge
doro_agent_tls_ca_path: /etc/doro-agent/pki/ca.pem
doro_agent_tls_cert_path: /etc/doro-agent/pki/agent.pem
doro_agent_tls_key_path: /etc/doro-agent/pki/agent.key
doro_agent_tls_server_name: ""
doro_agent_tls_ca_src_path: ""
doro_agent_tls_cert_src_path: ""
doro_agent_tls_key_src_path: ""

doro_agent_heartbeat_interval_sec: 30
doro_agent_diagnostics_interval_sec: 30
doro_agent_batch_max_events: 500
doro_agent_batch_max_bytes: 524288
doro_agent_batch_flush_interval_ms: 2000
doro_agent_batch_compress_threshold_bytes: 16384
doro_agent_queue_event_capacity: 4096
doro_agent_queue_send_capacity: 32
doro_agent_queue_event_bytes_soft_limit: 8388608
doro_agent_queue_send_bytes_soft_limit: 16777216
doro_agent_degraded_failure_threshold: 3
doro_agent_degraded_server_unavailable_sec: 30
doro_agent_degraded_queue_pressure_pct: 80
doro_agent_degraded_queue_recover_pct: 40
doro_agent_degraded_unacked_lag_bytes: 16777216
doro_agent_degraded_shutdown_spool_grace_sec: 5
doro_agent_spool_enabled: true
doro_agent_spool_dir: /var/lib/doro-agent/spool
doro_agent_spool_max_disk_bytes: 268435456

doro_agent_sources:
  - type: file
    source_id: file:/var/log/syslog
    path: /var/log/syslog
    start_at: end
    source: syslog
    service: host
    severity_hint: info
