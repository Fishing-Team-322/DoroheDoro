---
- name: Derive target platform metadata
  ansible.builtin.set_fact:
    doro_agent_target_arch: >-
      {% if ansible_architecture in ['x86_64', 'amd64'] %}amd64{% elif ansible_architecture in ['aarch64', 'arm64'] %}arm64{% else %}{{ ansible_architecture }}{% endif %}
    doro_agent_target_distro_family: >-
      {% if 'astra' in (ansible_distribution | lower) %}astra-linux{% elif ansible_os_family == 'Debian' %}debian{% else %}generic-glibc{% endif %}
    doro_agent_requested_install_mode: "{{ doro_agent_install_mode | lower }}"
    doro_agent_has_direct_image_input: >-
      {{
        (doro_agent_install_mode | lower) in ['docker_image', 'container']
        and (
          (doro_agent_image_digest | trim) != ''
          or ((doro_agent_image_repository | trim) != '' and (doro_agent_image_repository | trim) != 'docker.io/<org>/doro-agent')
          or ((doro_agent_image_tag | trim) != '' and (doro_agent_image_tag | trim) != 'main')
        )
      }}

- name: Ensure manifest source is configured
  ansible.builtin.fail:
    msg: doro_agent_artifact_manifest_path or doro_agent_artifact_manifest_url must be provided when state=present and no direct image input exists
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool
    - doro_agent_artifact_manifest_path | trim == ''
    - doro_agent_artifact_manifest_url | trim == ''

- name: Download release manifest from URL
  ansible.builtin.get_url:
    url: "{{ doro_agent_artifact_manifest_url }}"
    dest: /tmp/doro-agent-release-manifest.json
    mode: "0644"
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool
    - doro_agent_artifact_manifest_url | trim != ''

- name: Resolve manifest path
  ansible.builtin.set_fact:
    doro_agent_manifest_path_resolved: >-
      {{ '/tmp/doro-agent-release-manifest.json' if (doro_agent_artifact_manifest_url | trim) != '' else doro_agent_artifact_manifest_path }}
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool

- name: Read release manifest
  ansible.builtin.slurp:
    src: "{{ doro_agent_manifest_path_resolved }}"
  register: doro_agent_manifest_raw
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool

- name: Parse release manifest
  ansible.builtin.set_fact:
    doro_agent_manifest: "{{ doro_agent_manifest_raw.content | b64decode | from_json }}"
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool

- name: Select preferred package type
  ansible.builtin.set_fact:
    doro_agent_preferred_package_type: >-
      {% if doro_agent_requested_install_mode in ['docker_image', 'container'] %}container{% elif doro_agent_requested_install_mode == 'deb' %}deb{% elif doro_agent_requested_install_mode == 'tar.gz' %}tar.gz{% elif doro_agent_target_distro_family in ['debian', 'astra-linux'] %}deb{% else %}container{% endif %}
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool

- name: Gather artifacts for current arch
  ansible.builtin.set_fact:
    doro_agent_arch_artifacts: >-
      {{
        doro_agent_manifest.artifacts
        | selectattr('platform', 'equalto', 'linux')
        | selectattr('arch', 'equalto', doro_agent_target_arch)
        | list
      }}
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool

- name: Select best matching artifact
  ansible.builtin.set_fact:
    doro_agent_selected_artifact: >-
      {{
        (
          doro_agent_arch_artifacts
          | selectattr('package_type', 'equalto', doro_agent_preferred_package_type)
          | selectattr('distro_family', 'equalto', doro_agent_target_distro_family)
          | sort(attribute='packaging_preference', reverse=true)
          | list
          | first
        )
        | default(
          (
            doro_agent_arch_artifacts
            | selectattr('package_type', 'equalto', doro_agent_preferred_package_type)
            | selectattr('distro_family', 'equalto', 'generic-glibc')
            | sort(attribute='packaging_preference', reverse=true)
            | list
            | first
          ),
          true
        )
        | default(
          (
            doro_agent_arch_artifacts
            | sort(attribute='packaging_preference', reverse=true)
            | list
            | first
          ),
          true
        )
      }}
  when:
    - doro_agent_state == 'present'
    - doro_agent_selected_artifact is not mapping
    - not doro_agent_has_direct_image_input | bool

- name: Ensure selected artifact exists
  ansible.builtin.fail:
    msg: >-
      No matching doro-agent artifact found for arch={{ doro_agent_target_arch }}
      distro_family={{ doro_agent_target_distro_family }}
      install_mode={{ doro_agent_requested_install_mode }}
  when:
    - doro_agent_state == 'present'
    - not doro_agent_has_direct_image_input | bool
    - doro_agent_selected_artifact is not mapping

- name: Resolve effective install mode
  ansible.builtin.set_fact:
    doro_agent_effective_install_mode: >-
      {% if doro_agent_state == 'absent' %}absent{% elif doro_agent_selected_artifact is mapping and ((doro_agent_selected_artifact.install_mode | default('')) == 'docker_image' or (doro_agent_selected_artifact.package_type | default('')) == 'container') %}docker_image{% elif doro_agent_requested_install_mode in ['docker_image', 'container'] %}docker_image{% else %}legacy_binary{% endif %}

- name: Resolve image source from selected artifact or direct vars
  ansible.builtin.set_fact:
    doro_agent_selected_image_reference: >-
      {% if doro_agent_selected_artifact is mapping %}{{ doro_agent_selected_artifact.image_reference | default(doro_agent_selected_artifact.source_uri | default(doro_agent_selected_artifact.artifact_path | default(''))) }}{% else %}{{ doro_agent_image_repository }}:{{ doro_agent_image_tag }}{% endif %}
    doro_agent_selected_image_repository: >-
      {% if doro_agent_selected_artifact is mapping %}{{ doro_agent_selected_artifact.image_repository | default((doro_agent_selected_artifact.source_uri | default(doro_agent_selected_artifact.artifact_path | default(''))) | regex_replace(':[^/:@]+$', '')) }}{% else %}{{ doro_agent_image_repository }}{% endif %}
    doro_agent_selected_image_tag: >-
      {% if doro_agent_selected_artifact is mapping %}{{ doro_agent_selected_artifact.image_tag | default(doro_agent_image_tag) }}{% else %}{{ doro_agent_image_tag }}{% endif %}
    doro_agent_selected_image_digest: >-
      {% if doro_agent_selected_artifact is mapping %}{{ doro_agent_selected_artifact.image_digest | default((('sha256:' ~ doro_agent_selected_artifact.sha256) if (doro_agent_selected_artifact.sha256 | default('') | trim) != '' else '')) }}{% else %}{{ ('sha256:' ~ doro_agent_image_digest) if ((doro_agent_image_digest | trim) != '' and not (doro_agent_image_digest | trim).startswith('sha256:')) else (doro_agent_image_digest | trim) }}{% endif %}
  when:
    - doro_agent_state == 'present'
    - doro_agent_effective_install_mode == 'docker_image'

- name: Resolve normalized image facts
  ansible.builtin.set_fact:
    doro_agent_resolved_image_repository: "{{ doro_agent_selected_image_repository }}"
    doro_agent_resolved_image_tag: "{{ doro_agent_selected_image_tag }}"
    doro_agent_resolved_image_digest: "{{ doro_agent_selected_image_digest }}"
  when:
    - doro_agent_state == 'present'
    - doro_agent_effective_install_mode == 'docker_image'

- name: Ensure service group exists
  ansible.builtin.group:
    name: "{{ doro_agent_group }}"
    state: present
  when: doro_agent_state == 'present'

- name: Ensure service user exists
  ansible.builtin.user:
    name: "{{ doro_agent_user }}"
    group: "{{ doro_agent_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  when: doro_agent_state == 'present'

- name: Ensure runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(doro_agent_user) }}"
    group: "{{ item.group | default(doro_agent_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ doro_agent_config_dir }}", mode: "0750" }
    - { path: "{{ doro_agent_pki_dir }}", mode: "0750" }
    - { path: "{{ doro_agent_state_dir }}", mode: "0750" }
    - { path: "{{ doro_agent_log_dir }}", mode: "0750" }
    - { path: "{{ doro_agent_docs_dir }}", mode: "0750" }
    - { path: "{{ doro_agent_container_runner_dir }}", owner: "root", group: "root", mode: "0755" }
  when: doro_agent_state == 'present'

- name: Install TLS CA bundle
  ansible.builtin.copy:
    src: "{{ doro_agent_tls_ca_src_path }}"
    dest: "{{ doro_agent_tls_ca_path }}"
    owner: root
    group: "{{ doro_agent_group }}"
    mode: "0640"
  notify: Restart doro-agent
  when:
    - doro_agent_state == 'present'
    - doro_agent_tls_ca_src_path | trim != ''

- name: Install TLS client certificate
  ansible.builtin.copy:
    src: "{{ doro_agent_tls_cert_src_path }}"
    dest: "{{ doro_agent_tls_cert_path }}"
    owner: root
    group: "{{ doro_agent_group }}"
    mode: "0640"
  notify: Restart doro-agent
  when:
    - doro_agent_state == 'present'
    - doro_agent_tls_cert_src_path | trim != ''

- name: Install TLS client private key
  ansible.builtin.copy:
    src: "{{ doro_agent_tls_key_src_path }}"
    dest: "{{ doro_agent_tls_key_path }}"
    owner: root
    group: "{{ doro_agent_group }}"
    mode: "0640"
  notify: Restart doro-agent
  when:
    - doro_agent_state == 'present'
    - doro_agent_tls_key_src_path | trim != ''

- name: Ensure spool directory exists
  ansible.builtin.file:
    path: "{{ doro_agent_spool_dir }}"
    state: directory
    owner: "{{ doro_agent_user }}"
    group: "{{ doro_agent_group }}"
    mode: "0750"
  when:
    - doro_agent_state == 'present'
    - doro_agent_spool_enabled | bool

- name: Render agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ doro_agent_config_path }}"
    owner: root
    group: "{{ doro_agent_group }}"
    mode: "0640"
  notify: Restart doro-agent
  when: doro_agent_state == 'present'

- name: Render agent env file
  ansible.builtin.template:
    src: agent.env.j2
    dest: "{{ doro_agent_env_path }}"
    owner: root
    group: "{{ doro_agent_group }}"
    mode: "0640"
  notify: Restart doro-agent
  when: doro_agent_state == 'present'

- name: Include docker image install tasks
  ansible.builtin.include_tasks: docker-image.yml
  when:
    - doro_agent_state == 'present'
    - doro_agent_effective_install_mode == 'docker_image'

- name: Include legacy binary install tasks
  ansible.builtin.include_tasks: legacy-binary.yml
  when:
    - doro_agent_state == 'present'
    - doro_agent_effective_install_mode == 'legacy_binary'

- name: Include absent tasks
  ansible.builtin.include_tasks: absent.yml
  when: doro_agent_state == 'absent'
