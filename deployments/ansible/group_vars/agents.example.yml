---
# Copy this file to a private inventory/group_vars location and replace placeholders.
# It is intentionally example-only and must not contain real secrets in the repo.

doro_agent_artifact_manifest_url: https://fishingteam.su/artifacts/agent/release-manifest.json
doro_agent_release_base_url: https://fishingteam.su/artifacts/agent
doro_agent_install_mode: auto

# Single-host public boundary on the same domain as WEB.
doro_agent_edge_url: https://fishingteam.su
doro_agent_edge_grpc_addr: fishingteam.su:443

# Replace with a real bootstrap token or the runtime-issued token flow.
doro_agent_bootstrap_token: CHANGE_ME

doro_agent_log_level: info
doro_agent_transport_mode: edge

doro_agent_sources:
  - type: file
    source_id: file:/var/log/syslog
    path: /var/log/syslog
    start_at: end
    source: syslog
    service: host
    severity_hint: info

# Current boundary side is mTLS-ready and validated with fake-agent.
# The real agent runtime currently uses TLS to the public domain but does not yet expose
# client certificate configuration through this install contract. Keep this rollout on the
# public TLS path until agent-rs adds explicit client-cert support.
