edge_url: "http://localhost:8080"
edge_grpc_addr: "localhost:9090"
bootstrap_token: "dev-bootstrap-token"
state_dir: "./.tmp/doro-agent"
log_level: "info"

transport:
  mode: "mock"

install:
  mode: "dev"

platform:
  allow_machine_id: false

scope:
  configured_cluster_id: "local-dev"
  cluster_name: "dev-cluster"
  service_name: "agent-smoke"
  environment: "development"
  configured_cluster_tags:
    owner: "local"
  host_labels:
    role: "workstation"

heartbeat:
  interval_sec: 30

diagnostics:
  interval_sec: 30

security_scan:
  enabled: true
  interval_sec: 3600
  jitter_sec: 60
  timeout_sec: 30
  max_parallel_checks: 4
  profile: "balanced"
  allowed_ports: [22]
  blocked_ports: [23, 2375]
  package_watchlist: ["openssl", "openssh", "nginx", "docker"]
  version_rules_path: "./config/security-rules.example.yaml"
  publish_as_diagnostics: true
  persist_last_report: true

batch:
  max_events: 250
  max_bytes: 262144
  flush_interval_ms: 1500
  compress_threshold_bytes: 16384

queues:
  event_capacity: 1024
  send_capacity: 16
  event_bytes_soft_limit: 2097152
  send_bytes_soft_limit: 4194304

degraded:
  failure_threshold: 3
  server_unavailable_sec: 30
  queue_pressure_pct: 80
  queue_recover_pct: 40
  unacked_lag_bytes: 4194304
  shutdown_spool_grace_sec: 5

spool:
  enabled: true
  dir: "./.tmp/doro-agent/spool"
  max_disk_bytes: 67108864

sources:
  - type: "file"
    source_id: "file:./.tmp/doro-test.log"
    path: "./.tmp/doro-test.log"
    start_at: "end"
    source: "local-test"
    service: "unknown"
    severity_hint: "info"
