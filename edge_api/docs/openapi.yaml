"openapi": "3.0.3"
"info":
  "title": "DoroheDoro Edge API"
  "version": "0.4.0"
  "description": "Public boundary API for WEB and AGENT. The Go edge service validates transport payloads, applies web auth or agent mTLS, bridges requests over NATS to server-rs runtime planes, and exposes SSE streams for UI consumers."
"servers":
  - "url": "/"
    "description": "Direct edge-api or reverse proxy with stripped prefix."
  - "url": "/api/edge"
    "description": "Same-origin frontend proxy path."
"tags":
  - "name": "system"
    "description": "Public health, readiness, version and discovery routes."
  - "name": "auth"
    "description": "Frontend compatibility auth routes and stub session inspection."
  - "name": "agents"
    "description": "Agent registry, diagnostics and current policy read-side."
  - "name": "policies"
    "description": "Policies bridged to control-plane."
  - "name": "inventory"
    "description": "Hosts, host groups and credentials metadata."
  - "name": "deployments"
    "description": "Deployment plan, jobs, steps and targets."
  - "name": "clusters"
    "description": "Cluster registry and host membership."
  - "name": "roles"
    "description": "Roles, permissions and role bindings."
  - "name": "integrations"
    "description": "Outbound integrations and scope bindings."
  - "name": "tickets"
    "description": "Ticket lifecycle actions and ticket comments."
  - "name": "anomalies"
    "description": "Anomaly rules and anomaly instances."
  - "name": "logs"
    "description": "Live query-plane log search, context and analytics routes backed by server-rs."
  - "name": "dashboards"
    "description": "Live overview dashboards backed by query-alert-plane."
  - "name": "alerts"
    "description": "Live alert instance and alert rule APIs backed by query-alert-plane."
  - "name": "audit"
    "description": "Live cross-plane audit feed backed by control-plane runtime audit events."
  - "name": "stream"
    "description": "SSE gateway endpoints."
"paths":
  "/":
    "get":
      "tags":
        - "system"
      "summary": "Boundary discovery document"
      "security":
        []
      "responses":
        "200":
          "description": "OK."
          "headers":
            "X-Request-ID":
              "$ref": "#/components/headers/RequestId"
          "content":
            "application/json":
