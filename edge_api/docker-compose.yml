services:
  nats:
    image: nats:2.11-alpine
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  edge-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVICE_NAME: edge-api
      LOG_LEVEL: debug
      HTTP_LISTEN_ADDR: :8080
      GRPC_LISTEN_ADDR: :9090
      NATS_URL: nats://nats:4222
      NATS_REQUEST_TIMEOUT: 3s
      HTTP_REQUEST_TIMEOUT: 15s
      GRPC_REQUEST_TIMEOUT: 15s
      HTTP_MAX_BODY_BYTES: 1048576
      AGENT_LOG_BATCH_SIZE: 1000
      STREAM_HEARTBEAT_INTERVAL: 25s
      STREAM_RETRY_INTERVAL: 5s
      HTTP_AUTH_STUB_ENABLED: "true"
      DEV_TEST_LOGIN: admin
      DEV_TEST_EMAIL: admin@example.com
      DEV_TEST_PASSWORD: admin123
      DEV_TEST_USER_ID: dev-user-1
      DEV_TEST_ROLE: admin
      COOKIE_SECURE: "false"
      SESSION_TTL: 24h
      GRPC_MTLS_HOOK_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - nats
    ports:
      - "8080:8080"
      - "9090:9090"

  fake-agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/fake-agent"]
    environment:
      EDGE_API_GRPC_ADDR: edge-api:9090
      FAKE_AGENT_ENROLLMENT_TOKEN: dev-bootstrap-token
      FAKE_AGENT_HOST: smoke-host
    depends_on:
      - edge-api
    profiles: ["smoke"]
