syntax = "proto3";

package dorohedoro.runtime.v1;

option go_package = "github.com/example/dorohedoro/contracts/runtimeproto;runtimev1";

message RuntimeReplyEnvelope {
  string status = 1;
  string code = 2;
  string message = 3;
  bytes payload = 4;
  string correlation_id = 5;
}

message AuditContext {
  string actor_id = 1;
  string actor_type = 2;
  string request_id = 3;
  string reason = 4;
}

message PagingRequest {
  uint32 limit = 1;
  uint64 offset = 2;
  string query = 3;
}

message PagingResponse {
  uint32 limit = 1;
  uint64 offset = 2;
  uint64 total = 3;
}
