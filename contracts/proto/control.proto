syntax = "proto3";

package dorohedoro.control.v1;

option go_package = "github.com/example/dorohedoro/contracts/controlproto;controlv1";
import "runtime.proto";

// Policy contracts
message Policy {
  string policy_id = 1;
  string name = 2;
  string description = 3;
  bool is_active = 4;
  string latest_revision_id = 5;
  string latest_revision = 6;
  string policy_body_json = 7;
  string created_at = 8;
  string updated_at = 9;
  string created_by = 10;
  string updated_by = 11;
  string update_reason = 12;
}

message PolicyRevision {
  string policy_revision_id = 1;
  string policy_id = 2;
  string revision = 3;
  string policy_body_json = 4;
  string created_at = 5;
  string created_by = 6;
  string reason = 7;
  string request_id = 8;
}

message ListPoliciesRequest {
  string correlation_id = 1;
  dorohedoro.runtime.v1.PagingRequest paging = 2;
}

message ListPoliciesResponse {
  repeated Policy policies = 1;
  dorohedoro.runtime.v1.PagingResponse paging = 2;
}

message GetPolicyRequest {
  string correlation_id = 1;
  string policy_id = 2;
}

message CreatePolicyRequest {
  string correlation_id = 1;
  string name = 2;
  string description = 3;
  string policy_body_json = 4;
  dorohedoro.runtime.v1.AuditContext audit = 5;
}

message UpdatePolicyRequest {
  string correlation_id = 1;
  string policy_id = 2;
  string description = 3;
  string policy_body_json = 4;
  dorohedoro.runtime.v1.AuditContext audit = 5;
}

message GetPolicyRevisionsRequest {
  string correlation_id = 1;
  string policy_id = 2;
  dorohedoro.runtime.v1.PagingRequest paging = 3;
}

message GetPolicyRevisionsResponse {
  repeated PolicyRevision revisions = 1;
  dorohedoro.runtime.v1.PagingResponse paging = 2;
}

// Inventory contracts
message Host {
  string host_id = 1;
  string hostname = 2;
  string ip = 3;
  uint32 ssh_port = 4;
  string remote_user = 5;
  map<string, string> labels = 6;
  string created_at = 7;
  string updated_at = 8;
  string created_by = 9;
  string updated_by = 10;
  string update_reason = 11;
}

message HostInput {
  string hostname = 1;
  string ip = 2;
  uint32 ssh_port = 3;
  string remote_user = 4;
  map<string, string> labels = 5;
}

message ListHostsRequest {
  string correlation_id = 1;
  dorohedoro.runtime.v1.PagingRequest paging = 2;
}

message ListHostsResponse {
  repeated Host hosts = 1;
  dorohedoro.runtime.v1.PagingResponse paging = 2;
}

message GetHostRequest {
  string correlation_id = 1;
  string host_id = 2;
}

message CreateHostRequest {
  string correlation_id = 1;
  HostInput host = 2;
  dorohedoro.runtime.v1.AuditContext audit = 3;
}

message UpdateHostRequest {
  string correlation_id = 1;
  string host_id = 2;
  HostInput host = 3;
  dorohedoro.runtime.v1.AuditContext audit = 4;
}

message HostGroup {
  string host_group_id = 1;
  string name = 2;
  string description = 3;
  string created_at = 4;
  string updated_at = 5;
  repeated HostGroupMember members = 6;
  string created_by = 7;
  string updated_by = 8;
  string update_reason = 9;
}

message HostGroupMember {
  string host_group_member_id = 1;
  string host_group_id = 2;
  string host_id = 3;
  string hostname = 4;
}

message ListHostGroupsRequest {
  string correlation_id = 1;
  dorohedoro.runtime.v1.PagingRequest paging = 2;
}

message ListHostGroupsResponse {
  repeated HostGroup groups = 1;
  dorohedoro.runtime.v1.PagingResponse paging = 2;
}

message GetHostGroupRequest {
  string correlation_id = 1;
  string host_group_id = 2;
}

message CreateHostGroupRequest {
  string correlation_id = 1;
  string name = 2;
  string description = 3;
  dorohedoro.runtime.v1.AuditContext audit = 4;
}

message UpdateHostGroupRequest {
  string correlation_id = 1;
  string host_group_id = 2;
  string name = 3;
  string description = 4;
  dorohedoro.runtime.v1.AuditContext audit = 5;
}

message AddHostGroupMemberRequest {
  string correlation_id = 1;
  string host_group_id = 2;
  string host_id = 3;
  dorohedoro.runtime.v1.AuditContext audit = 4;
}

message RemoveHostGroupMemberRequest {
  string correlation_id = 1;
  string host_group_id = 2;
  string host_id = 3;
  dorohedoro.runtime.v1.AuditContext audit = 4;
}

// Credential metadata contracts
message CredentialProfileMetadata {
  string credentials_profile_id = 1;
  string name = 2;
  string kind = 3;
  string description = 4;
  string vault_ref = 5;
  string created_at = 6;
  string updated_at = 7;
  string created_by = 8;
  string updated_by = 9;
  string update_reason = 10;
}

message ListCredentialsRequest {
  string correlation_id = 1;
  dorohedoro.runtime.v1.PagingRequest paging = 2;
}

message ListCredentialsResponse {
  repeated CredentialProfileMetadata profiles = 1;
  dorohedoro.runtime.v1.PagingResponse paging = 2;
}

message GetCredentialsRequest {
  string correlation_id = 1;
  string credentials_profile_id = 2;
}

message CreateCredentialsRequest {
  string correlation_id = 1;
  string name = 2;
  string kind = 3;
  string description = 4;
  string vault_ref = 5;
  dorohedoro.runtime.v1.AuditContext audit = 6;
}
